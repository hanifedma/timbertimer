<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — TimberTimer</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="/timbertimer/assets/canopy-logo.svg" type="image/svg+xml" />
  <script>
    (function () {
      var saved = null;
      try { saved = localStorage.getItem("timbertimer:theme:v1"); } catch (e) { }
      document.documentElement.dataset.theme = saved === "light" ? "light" : "dark";
    })();
  </script>
  <style>
    :root,
    :root[data-theme="dark"] {
      --bg: #000;
      --surface: #1c1c1e;
      --ink: #fff;
      --muted: rgba(235, 235, 245, .6);
      --line: rgba(255, 255, 255, .12);
      --accent: #30d158;
      --accent-ink: #06210f;
    }

    :root[data-theme="light"] {
      --bg: #f2f2f7;
      --surface: #fff;
      --ink: #000;
      --muted: rgba(60, 60, 67, .6);
      --line: rgba(60, 60, 67, .14);
      --accent: #248a3d;
      --accent-ink: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: min(440px, 100%);
      padding: 40px 28px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 8px 30px rgba(0, 0, 0, .3);
    }

    .mark { font-size: 56px; line-height: 1; }

    h1 { margin: 14px 0 6px; font-size: 1.5rem; }

    .code { color: var(--accent); font-weight: 800; letter-spacing: .04em; }

    p { margin: 0 0 24px; color: var(--muted); line-height: 1.5; }

    a.home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 0 20px;
      border-radius: 12px;
      color: var(--accent-ink);
      background: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="mark" aria-hidden="true">🌲</div>
    <h1><span class="code">404</span> — This clearing is empty</h1>
    <p>The page you were looking for isn't here. Let's head back and grow something instead.</p>
    <a class="home" id="homeLink" href="/timbertimer/">🌱 Back to TimberTimer</a>
  </main>
  <script>
    // Point home at the site root regardless of how deep the bad URL was.
    (function () {
      var parts = location.pathname.split("/").filter(Boolean);
      document.getElementById("homeLink").href = parts.length ? "/" + parts[0] + "/" : "/";
    })();
  </script>
</body>

</html>
